---
functional:
 - Выбор языка программирования (JS, PHP, Python, Ruby) для решения задачи.
 - Синхронное отображение кода соперника в реальном времени.
 - Система запуска автоматических тестов и вывод их результатов.
 - Создание игровых комнат (публичных и по прямой ссылке).
 - Чат для общения игроков и зрителей.
 - Режим просмотра игры (зритель).
 - Расширение для Chrome для мониторинга активных игр.
non-functional:
  - Сайт должен быть разработан с учетом удобства использования и оптимизирован для скорости работы
  - Сайт должен быть удобным на мобильном устройстве
  - Сайт должен быть безопасным и защищать данные пользователя
  - Сайт должен быть протестирован на совместимость с последними версиями браузеров
  - Сайт должен быть способен обрабатывать большое количество трафика (например, 1000 одновременных пользователей)
  - Архитектура должна выдерживать нагрузку (например, 1000+ одновременных сессий).
  - Трансформация тестов с Clojure на целевые языки через библиотеку multicode.
  - Минимальная задержка при передаче изменений кода (Real-time).
implicit:
 - Изолированное выполнение пользовательского кода, чтобы он не повредил сервер.
 - Ограничение времени выполнения кода (защита от бесконечных циклов).
 - Корректная обработка разрыва соединения (Reconnect) без потери прогресса в бою.
 - Возможность добавления задач через GitHub Pull Requests.