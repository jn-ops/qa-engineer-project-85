    Была создана игра. Открыта страница с игрой
  test-data: |
    Email = hexlet@gmail.ru Пароль = 123456&
  steps:
    - Нажимаем "Back to Home"
  expected-result: |
    Открывается главная страница пользователя

- summary: |
    Корректное расположение блоков задания и времени игры
  requirement: |
    Блок с заданием находится сверху, блок с временем игры под ним
  prerequisites: |
    Открыта главная страница пользователя
  test-data: |
    Email = hexlet@gmail.ru Пароль = 123456&
  steps:
  - Создать баттл
  expected-result: |
    Блок с заданием находится сверху, блок с временем игры под ним
    
- summary: |
    Игра может длиться неограниченно
  requirement: |
    При создании баттла можно установить бесконечное время игры
  prerequisites: |
    Открыто окно "Create game"
  test-data: |
    Email = hexlet@gmail.ru Пароль = 123456&
  steps:
    - Сдвинуть ползунок "Time control" максимально вправо
  expected-result: |
    Значение установленного времени стало неограниченным 
    
- summary: |
    Проигравший может продолжать писать и проверять свой код
