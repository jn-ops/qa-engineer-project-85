---
- summary: |
    Проверка регистрации пользователя (пароли должны совпадать) 
  requirement: |
    При несовпадении паролей пользователь должен получить сообщение об ошибке
  prerequisites:
    Открыта страница регистрации
  test-data: |
    Пароль = 123456&
  steps:
    - Вводим пароль
    - В строке "Подтверждение пароля" допускаем ошибку
    - Нажимаем кнопку «Подтвердить»
  expected-result: |
    Пользователь должен получить сообщение об ошибке

- summary: |
    Проверка регистрации пользователя (email не должен быть уже зарегистрированным) 
  requirement: |
    Если email уже зарегистрирован, то пользователь должен получить сообщение об ошибке
  prerequisites:
    Открыта страница регистрации
  test-data: |
    Email = hexlet@gmail.ru
  steps:
    - Вводим никнейм
    - Вводим email
    - Вводим пароль
    - Нажимаем кнопку «Подтвердить»
  expected-result: |
    Пользователь должен получить сообщение об ошибке

- summary: |
    Проверка регистрации пользователя (никнейм не должен быть уже зарегистрирован) 
