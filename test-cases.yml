  test-data: |
    Nickname = njm
  steps:
    - Вводим никнейм
    - Нажимаем кнопку «Подтвердить»
  expected-result: |
    Пользователь должен получить сообщение об ошибке

- summary: |
    Проверка входа пользователя с существующим email и паролем 
  requirement: |
    При верном вводе email и пароля пользователь должен войти в систему
  prerequisites: |
    Открыта страница входа
  test-data: |
   Email = hexlet@gmail.ru Пароль = 123456&
  steps:
    - Вводим email
    - Вводим пароль
    - Нажимаем кнопку «Войти»
  expected-result: |
    Пользователь должен попасть на главную страницу

