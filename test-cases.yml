- summary: |
    Проверка выбора языка
  requirement: |
    Игрок может выбрать любой язык программирования из списка 
  prerequisites: |
    Открыта страница баттла
  test-data: |
    Email = hexlet@gmail.ru Пароль = 123456&
  steps:
    - Открываем список языков
    - Выбираем любой язык из списка
  expected-result: |
    Язык программирования должен поменяться 
    
- summary: |
    Появление сообщения об ошибке при попытке запуска некорректного кода
  requirement: |
    Проверить, что система корректно прогоняет код и засчитывает только верное решение
  prerequisites: |
    Открыта страница баттла
  test-data: |
    Email = hexlet@gmail.ru Пароль = 123456&
  steps:
    - Допускаем ошибку в коде
    - Нажимаем "Run"
  expected-result: |
    Сайт должен выдать ошибку
    
- summary: |
    Разрыв соединения
  requirement: |
    Проверить, что при отсутствии интернета написанный код сохранится 
  prerequisites: |
    Открыта страница баттла
  test-data: |
    Email = hexlet@gmail.ru Пароль = 123456&
  steps:
    - Пишем любой текст в поле
    - Отключаем соединение с интернетом
    - Восстанавлием соединение с интернетом
    - Перезагружаем страницу
  expected-result: |
    Сайт должен оставить написанный текст 
        
- summary: |
    Адаптивность сайта 
  requirement: |
    Проверить, что на разных устройствах текст не выходит "за границы"
  prerequisites: |
    Открыта главная страница пользователя
  test-data: |
    Email = hexlet@gmail.ru Пароль = 123456&
  steps:
    - В DevTools выбрать "Dimensions" - "iPhone SE"
  expected-result: |
    Текст не выходит "за границы" на разных устройствах

