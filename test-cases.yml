---
- summary: |
    Открытие страницы регистрации пользователя
  requirement: |
    Страница регистрации открывается корректно
  prerequisites: |
    Открыта главная страница
  test-data: |
   Отсутствует
  steps:
    - Нажимаем "Sign up"
  expected-result: |
    Открывается окно с полями регистрации

- summary: |
    Открытие страницы входа пользователя
  requirement: |
    Страница входа открывается корректно
  prerequisites: |
    Открыта главная страница
  test-data: |
   Отсутствует
  steps:
    - Нажимаем "Sign in"
  expected-result: |
    Открывается окно с полями входа

- summary: |
    Невозможность регистрации пользователя при несовпадении паролей
  requirement: |
    При несовпадении паролей пользователь должен получить сообщение об ошибке
  prerequisites: |
    Открыта страница регистрации
  test-data: |
    Пароль = 123456&
  steps:
    - Вводим пароль
    - В строке "Подтверждение пароля" допускаем ошибку
    - Нажимаем кнопку «Подтвердить»
  expected-result: |
    Пользователь должен получить сообщение об ошибке

- summary: |
    Невозможность регистрации пользователя с уже зарегистрированным email 
  requirement: |
    Если email уже зарегистрирован, то пользователь должен получить сообщение об ошибке
  prerequisites: |
    Открыта страница регистрации
  test-data: |
    Email = hexlet@gmail.ru
  steps:
    - Вводим никнейм
    - Вводим email
    - Вводим пароль
    - Нажимаем кнопку «Подтвердить»
  expected-result: |
    Пользователь должен получить сообщение об ошибке

- summary: |
    Невозможность регистрации пользователя с уже зарегистрированным никнеймом
