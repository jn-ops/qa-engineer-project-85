    Успешное завершение игры
  requirement: |
    Окно с сообщением о завершении баттла отображается корректно
  prerequisites: |
    Была создана игра. Оппонент победил в игре
  test-data: |
    Email = hexlet@gmail.ru Пароль = 123456&
