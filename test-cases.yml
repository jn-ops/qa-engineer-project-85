  prerequisites: |
    Была создана игра. Открыта страница с игрой
  test-data: |
    Email = hexlet@gmail.ru Пароль = 123456&
  steps:
    - Завершить игру в статусе проигравшего 
  expected-result: |
    У проигравшего остаётся возможность писать и проверять свой код